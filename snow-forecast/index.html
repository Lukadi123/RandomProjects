<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomorrow's Snow Forecast ❄️</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>❄️ Tomorrow's Snow Forecast</h1>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name (e.g., New York, London)"
                class="city-input"
            >
            <button id="searchBtn" class="search-btn">Search</button>
            <button id="locationBtn" class="location-btn">📍 Use My Location</button>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Checking the forecast...</p>
        </div>

        <!-- Error State -->
        <div id="error" class="error hidden">
            <p id="errorMessage"></p>
        </div>

        <!-- Weather Display -->
        <div id="weatherDisplay" class="weather-display hidden">
            <!-- Emoji Display -->
            <div class="emoji-container">
                <span id="snowEmoji" class="snow-emoji"></span>
            </div>

            <!-- Message -->
            <div class="message-container">
                <h2 id="snowMessage" class="snow-message"></h2>
            </div>

            <!-- Location -->
            <div class="location-container">
                <p id="location" class="location"></p>
            </div>

            <!-- Weather Details -->
            <div class="weather-details">
                <div class="detail-item">
                    <span class="detail-label">Temperature:</span>
                    <span id="temperature" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Condition:</span>
                    <span id="condition" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Date:</span>
                    <span id="forecastDate" class="detail-value"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
